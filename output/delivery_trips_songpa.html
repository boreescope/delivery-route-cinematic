const T_MAX = 84174;

let currentTime = 0;
let animationSpeed = 10;
let playing = true;
let showTrip = true;
let showArc = false;

const INITIAL_VIEW = {
  longitude: 127.115,
  latitude: 37.505,
  zoom: 13,
  pitch: 45,
  bearing: 0,
};

const deckgl = new deck.DeckGL({
  container: 'map',
  mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  initialViewState: INITIAL_VIEW,
  controller: true,
  layers: [],
});

function getLayers() {
  const layers = [];
  if (showTrip) {
    layers.push(new deck.TripsLayer({
      id: 'trips',
      data: TRIPS,
      getPath: d => d.path,
      getTimestamps: d => d.path.map(p => p[2]),
      getColor: [253, 128, 93],
      widthMinPixels: 3,
      trailLength: 120,
      currentTime: currentTime,
      shadowEnabled: false,
    }));
  }
  if (showArc) {
    layers.push(new deck.ArcLayer({
      id: 'arcs',
      data: ARCS,
      getSourcePosition: d => d.from,
      getTargetPosition: d => d.to,
      getSourceColor: [64, 255, 0, 180],
      getTargetColor: [255, 200, 0, 180],
      getWidth: d => Math.max(1, 4 - d.duration / 10),
    }));
  }
  return layers;
}

function animate() {
  if (playing) {
    currentTime = (currentTime + animationSpeed) % T_MAX;
    document.getElementById('time-slider').value = currentTime;
    const mins = Math.floor(currentTime / 60);
    const hrs = Math.floor(mins / 60);
    document.getElementById('time-val').textContent = `${hrs}:${String(mins % 60).padStart(2,'0')}`;
  }
  deckgl.setProps({ layers: getLayers() });
  requestAnimationFrame(animate);
}

document.getElementById('toggle-trip').onchange = e => { showTrip = e.target.checked; };
document.getElementById('toggle-arc').onchange = e => { showArc = e.target.checked; };
document.getElementById('toggle-play').onchange = e => { playing = e.target.checked; };
document.getElementById('speed-slider').oninput = e => {
  animationSpeed = +e.target.value;
  document.getElementById('speed-val').textContent = `${animationSpeed}x`;
};
document.getElementById('time-slider').oninput = e => {
  currentTime = +e.target.value;
  playing = false;
  document.getElementById('toggle-play').checked = false;
};

animate();
</script>
