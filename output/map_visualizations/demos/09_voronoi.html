<!DOCTYPE html><html><head><meta charset="utf-8"><title>09 Voronoi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>09. Voronoi — 매장별 세력권</b><span>실제 매장 위치, 최근접 영역 분할.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  const seen = new Map();
  data.forEach(d => {
    const k = d.s.map(v=>v.toFixed(4)).join(',');
    if (!seen.has(k)) seen.set(k, d.s);
  });
  const stores = [...seen.values()];
  const bbox = [SEOUL_BBOX.minLng, SEOUL_BBOX.minLat, SEOUL_BBOX.maxLng, SEOUL_BBOX.maxLat];
  const delaunay = d3.Delaunay.from(stores);
  const voronoi = delaunay.voronoi(bbox);

  const palette = ['#ff2d7a','#00e5ff','#ffd93d','#8affc1','#b47aff','#ff8b2d'];
  stores.forEach((s, i) => {
    const cell = voronoi.cellPolygon(i);
    if (!cell) return;
    const latlngs = cell.map(c => [c[1], c[0]]);
    L.polygon(latlngs, {
      color:'#000', weight:0.8,
      fillColor: palette[i % palette.length],
      fillOpacity: 0.35
    }).addTo(map);
  });
  stores.forEach(s => {
    L.circleMarker(ll(s), {radius:1.5, color:'#fff', fillColor:'#fff', fillOpacity:1, weight:0}).addTo(map);
  });
});
</script></body></html>
