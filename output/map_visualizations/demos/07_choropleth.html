<!DOCTYPE html><html><head><meta charset="utf-8"><title>07 Choropleth</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>07. Choropleth — 자치구별 주문량</b><span>서울 25개 자치구, 실제 도착지 집계.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');

function pip(pt, poly){
  let inside=false;
  for (let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
    const intersect = ((yi>pt[1])!=(yj>pt[1])) && (pt[0] < (xj-xi)*(pt[1]-yi)/(yj-yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

Promise.all([
  fetch('https://raw.githubusercontent.com/southkorea/seoul-maps/master/kostat/2013/json/seoul_municipalities_geo_simple.json').then(r=>r.json()),
  loadDeliveries()
]).then(([geo, data]) => {
  geo.features.forEach(f => f.properties._cnt = 0);
  data.forEach(d => {
    for (const f of geo.features) {
      const polys = f.geometry.type==='Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
      let hit=false;
      for (const mp of polys) if (pip(d.d, mp[0])) { hit=true; break; }
      if (hit) { f.properties._cnt++; break; }
    }
  });
  const max = Math.max(...geo.features.map(f=>f.properties._cnt));
  L.geoJSON(geo, {
    style: f => {
      const t = f.properties._cnt/max;
      const r = Math.floor(30+225*t), g=Math.floor(60*(1-t)+20), b=Math.floor(200*(1-t)+80);
      return { color:'#111', weight:1, fillColor:`rgb(${r},${g},${b})`, fillOpacity:0.85 };
    }
  }).addTo(map);
});
</script></body></html>
