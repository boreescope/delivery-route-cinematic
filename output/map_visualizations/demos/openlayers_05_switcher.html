<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLayers - 레이어 스위처</title>
  <script src="https://cdn.jsdelivr.net/npm/ol@9.1.0/dist/ol.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.1.0/ol.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
    .layer-switcher {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      padding: 12px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .layer-switcher label {
      display: block;
      padding: 4px 0;
      cursor: pointer;
    }
    .layer-switcher input {
      margin-right: 8px;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div class="layer-switcher">
  <label><input type="radio" name="base" value="osm" checked> OSM</label>
  <label><input type="radio" name="base" value="watercolor"> Watercolor</label>
  <label><input type="radio" name="base" value="positron"> Positron</label>
  <label><input type="radio" name="base" value="esri"> ESRI Satellite</label>
</div>
<script>
const layers = {
  osm: new ol.layer.Tile({
    source: new ol.source.OSM(),
    visible: true
  }),
  watercolor: new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: 'https://watercolormaps.collection.cooperhewitt.org/tile/watercolor/{z}/{x}/{y}.jpg'
    }),
    visible: false
  }),
  positron: new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
    }),
    visible: false
  }),
  esri: new ol.layer.Tile({
    source: new ol.source.XYZ({
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    }),
    visible: false
  })
};

const map = new ol.Map({
  target: 'map',
  layers: Object.values(layers),
  view: new ol.View({
    center: ol.proj.fromLonLat([126.978, 37.5665]),
    zoom: 12
  })
});

// 레이어 스위처 이벤트
document.querySelectorAll('input[name="base"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    Object.entries(layers).forEach(([key, layer]) => {
      layer.setVisible(key === e.target.value);
    });
  });
});
</script>
</body>
</html>
