<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLayers - Stamen Watercolor</title>
  <script src="https://cdn.jsdelivr.net/npm/ol@9.1.0/dist/ol.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.1.0/ol.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
const map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: 'https://watercolormaps.collection.cooperhewitt.org/tile/watercolor/{z}/{x}/{y}.jpg',
        attributions: '© Cooper Hewitt | Stamen Design | OSM'
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([126.978, 37.5665]),
    zoom: 12
  })
});
</script>
</body>
</html>
