<!DOCTYPE html><html><head><meta charset="utf-8"><title>03 Heatmap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>03. Heatmap — 주문 밀집도</b><span>실제 배달 5,100건의 도착지 밀도.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  const pts = data.map(d => [d.d[1], d.d[0], 0.5]);
  L.heatLayer(pts, {
    radius: 28, blur: 22, maxZoom: 13,
    gradient: {0.1:'#1a2670', 0.3:'#6d00c8', 0.5:'#d21a82', 0.7:'#ff7a00', 0.9:'#ffd900', 1.0:'#ffffff'}
  }).addTo(map);
});
</script></body></html>
