<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLayers - VWorld (국토지리정보원)</title>
  <script src="https://cdn.jsdelivr.net/npm/ol@9.1.0/dist/ol.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.1.0/ol.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.9);
      padding: 10px 15px;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 12px;
      z-index: 1;
      max-width: 300px;
    }
    .info a { color: #0066cc; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
// VWorld API 키 (https://www.vworld.kr 에서 발급)
const VWORLD_API_KEY = '8CF7F60F-5FF2-3398-A2FA-1861727F9E36';

const map = new ol.Map({
  target: 'map',
  layers: [
    // VWorld 기본 지도
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_API_KEY}/Base/{z}/{y}/{x}.png`,
        attributions: '© VWorld 국토지리정보원'
      })
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([126.978, 37.5665]),
    zoom: 11
  })
});

// VWorld 다른 레이어 옵션:
// Base: 기본 지도
// Satellite: 위성 영상
// Hybrid: 위성 + 라벨
// gray: 회색조 지도
// midnight: 야간 모드
</script>
</body>
</html>
