<!DOCTYPE html><html><head><meta charset="utf-8"><title>11 Particles</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#cv{position:absolute;inset:0;pointer-events:none;z-index:500}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<canvas id="cv"></canvas>
<div id="label"><b>11. Flow Particles — 실시간 흐름</b><span>실제 배달 OD 따라 흐르는 입자. 도시의 맥박.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
function resize(){ cv.width = innerWidth*2; cv.height = innerHeight*2; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; ctx.scale(2,2); }
resize();

loadDeliveries().then(raw => {
  const parts = raw.slice(0, 1200).map((d, i) => ({
    s: d.s, e: d.d,
    mid: [(d.s[0]+d.d[0])/2 + ((i*37)%13-6)/400, (d.s[1]+d.d[1])/2 + ((i*53)%11-5)/400],
    t: (i*0.013) % 1,
    speed: 0.004 + ((i*7)%10)/2000,
    hue: (i*17)%60 + 180,
  }));
  function tick(){
    ctx.fillStyle = 'rgba(10,10,10,0.15)';
    ctx.fillRect(0,0,innerWidth,innerHeight);
    parts.forEach(p => {
      p.t += p.speed; if (p.t>1) p.t=0;
      const t=p.t, mt=1-t;
      const lng = mt*mt*p.s[0] + 2*mt*t*p.mid[0] + t*t*p.e[0];
      const lat = mt*mt*p.s[1] + 2*mt*t*p.mid[1] + t*t*p.e[1];
      const pt = map.latLngToContainerPoint([lat,lng]);
      ctx.fillStyle = `hsla(${p.hue},100%,65%,0.9)`;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, 1.6, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();
});
</script></body></html>
