<!DOCTYPE html><html><head><meta charset="utf-8"><title>08 Isochrone</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>08. Isochrone — 배달 소요시간 등고선</b><span>상위 매장별 실제 pickup→handover 분포 기반.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  const bucket = new Map();
  data.forEach(d => {
    const key = d.s.map(v => v.toFixed(2)).join(',');
    if (!bucket.has(key)) bucket.set(key, {pos:d.s, durs:[]});
    bucket.get(key).durs.push(d.dur);
  });
  const top = [...bucket.values()].filter(b => b.durs.length>20)
    .sort((a,b)=>b.durs.length-a.durs.length).slice(0,6);
  top.forEach(t => t.avg = t.durs.reduce((a,b)=>a+b,0)/t.durs.length);

  function ring(center, sec, color, alpha, seed){
    const rnd = seeded(seed);
    const meters = sec * 5.5;  // ~20 km/h
    const rLat = meters / 111000;
    const rLng = meters / 88000;
    const N = 72, poly = [];
    for (let i=0;i<N;i++){
      const a = (i/N)*Math.PI*2;
      const noise = 1 + (rnd()-0.5)*0.22;
      poly.push([ center[1] + Math.sin(a)*rLat*noise, center[0] + Math.cos(a)*rLng*noise ]);
    }
    L.polygon(poly, { color, weight:1.2, fillColor:color, fillOpacity:alpha }).addTo(map);
  }
  top.forEach((t,i) => {
    ring(t.pos, t.avg*1.5, '#ff2d7a', 0.12, i+1);
    ring(t.pos, t.avg*1.0, '#ff8b2d', 0.18, i+11);
    ring(t.pos, t.avg*0.5, '#ffd93d', 0.28, i+21);
    L.circleMarker(ll(t.pos), {radius:4, color:'#fff', fillColor:'#fff', fillOpacity:1, weight:1}).addTo(map);
  });
});
</script></body></html>
