<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLayers - GeoJSON 오버레이</title>
  <script src="https://cdn.jsdelivr.net/npm/ol@9.1.0/dist/ol.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.1.0/ol.css">
  <style>
    * { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
// 샘플 GeoJSON - 서울 주요 지점
const geojsonData = {
  type: 'FeatureCollection',
  features: [
    {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [126.978, 37.5665] },
      properties: { name: '서울시청', type: 'government' }
    },
    {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [126.9784, 37.5796] },
      properties: { name: '경복궁', type: 'landmark' }
    },
    {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [127.0276, 37.4979] },
      properties: { name: '강남역', type: 'station' }
    },
    {
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: [
          [126.978, 37.5665],
          [126.9784, 37.5796],
          [127.0276, 37.4979]
        ]
      },
      properties: { name: '연결선' }
    }
  ]
};

// 벡터 소스
const vectorSource = new ol.source.Vector({
  features: new ol.format.GeoJSON().readFeatures(geojsonData, {
    featureProjection: 'EPSG:3857'
  })
});

// 스타일 함수
const styleFunction = (feature) => {
  const type = feature.getGeometry().getType();
  if (type === 'Point') {
    return new ol.style.Style({
      image: new ol.style.Circle({
        radius: 8,
        fill: new ol.style.Fill({ color: '#e74c3c' }),
        stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
      }),
      text: new ol.style.Text({
        text: feature.get('name'),
        offsetY: -15,
        fill: new ol.style.Fill({ color: '#333' }),
        stroke: new ol.style.Stroke({ color: '#fff', width: 3 })
      })
    });
  } else {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({
        color: '#3498db',
        width: 3,
        lineDash: [10, 5]
      })
    });
  }
};

const map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.OSM()
    }),
    new ol.layer.Vector({
      source: vectorSource,
      style: styleFunction
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([126.99, 37.54]),
    zoom: 12
  })
});

// 클릭 이벤트
map.on('click', (e) => {
  const feature = map.forEachFeatureAtPixel(e.pixel, f => f);
  if (feature) {
    alert(feature.get('name'));
  }
});
</script>
</body>
</html>
