<!DOCTYPE html><html><head><meta charset="utf-8"><title>05 Hex Intensity</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>05. Hex 강도 — 중첩 글로우</b><span>셀 위에 intensity 비례 glow 원을 중첩. 3D 대체.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  const RES = 8;
  const counts = new Map();
  data.forEach(d => {
    const h = h3.latLngToCell(d.d[1], d.d[0], RES);
    counts.set(h, (counts.get(h)||0)+1);
  });
  const max = Math.max(...counts.values());
  for (const [hex, cnt] of counts) {
    const boundary = h3.cellToBoundary(hex);
    const [clat, clng] = h3.cellToLatLng(hex);
    const t = cnt/max;
    // 격자 베이스
    L.polygon(boundary, { color:'#1a1a2a', weight: 0.3, fillColor:'#0f1030', fillOpacity: 0.7 }).addTo(map);
    // 중심에 glow 원들
    for (let layer=3; layer>=1; layer--){
      const alpha = (0.14 + t*0.25) / layer;
      const radius = 60 + t*500 + (3-layer)*80;
      L.circle([clat, clng], {
        radius, weight: 0,
        fillColor: `rgb(${Math.floor(120+135*t)},${Math.floor(60+100*t)},${Math.floor(220-140*t)})`,
        fillOpacity: alpha
      }).addTo(map);
    }
  }
});
</script></body></html>
