<!DOCTYPE html><html><head><meta charset="utf-8"><title>01 Arc</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#0a0a0a}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
</style></head><body>
<div id="map"></div>
<div id="label"><b>01. Arc — 매장→고객 OD</b><span>실제 배달 5,100건. Bezier 아크.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  // 샘플 800개만 (너무 많으면 과포화)
  const sample = data.slice(0, 800);
  sample.forEach(d => {
    const pts = bezierArc(d.s, d.d, 0.18, 20);
    L.polyline(pts, {
      color: '#ff8b2d', weight: 0.7, opacity: 0.45
    }).addTo(map);
  });
  // 매장/고객 점
  data.forEach(d => {
    L.circleMarker(ll(d.s), {radius:1.2, color:'#ffd93d', fillColor:'#ffd93d', fillOpacity:0.7, weight:0}).addTo(map);
    L.circleMarker(ll(d.d), {radius:1, color:'#ff2d7a', fillColor:'#ff2d7a', fillOpacity:0.55, weight:0}).addTo(map);
  });
});
</script></body></html>
