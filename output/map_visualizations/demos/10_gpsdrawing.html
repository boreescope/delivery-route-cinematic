<!DOCTYPE html><html><head><meta charset="utf-8"><title>10 GPS Drawing</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:-apple-system,sans-serif}
#map{position:absolute;inset:0;background:#000}
#label{position:absolute;left:24px;bottom:20px;z-index:1000;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px)}
#label b{font-size:16px;display:block;margin-bottom:3px;font-weight:700}
#label span{color:#bbb}
.leaflet-tile-pane { opacity: 0 !important; }
</style></head><body>
<div id="map"></div>
<div id="label"><b>10. GPS 누적 드로잉 — Jeremy Wood 오마주</b><span>지도 없이 배달선만. 서울 도시 형태가 궤적으로 드러남.</span></div>
<script src="_common.js"></script>
<script>
const map = initMap('map');
loadDeliveries().then(data => {
  data.forEach(d => {
    L.polyline([ll(d.s), ll(d.d)], {
      color:'#fff', weight: 0.5, opacity: 0.45
    }).addTo(map);
  });
});
</script></body></html>
