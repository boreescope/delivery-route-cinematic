<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapLibre GL JS - Stamen Watercolor</title>
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      watercolor: {
        type: 'raster',
        tiles: ['https://watercolormaps.collection.cooperhewitt.org/tile/watercolor/{z}/{x}/{y}.jpg'],
        tileSize: 256,
        attribution: '<a href="https://collection.cooperhewitt.org/">Cooper Hewitt</a> | <a href="https://stamen.com/">Stamen Design</a> | <a href="https://openstreetmap.org">OSM</a>'
      }
    },
    layers: [
      {
        id: 'watercolor-tiles',
        type: 'raster',
        source: 'watercolor'
      }
    ]
  },
  center: [126.978, 37.5665],
  zoom: 12
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
</script>
</body>
</html>
