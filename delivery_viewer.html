<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>배달 경로 뷰어</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.css"/>
<style>
  body{margin:0;font-family:-apple-system,sans-serif}
  #map{position:absolute;top:0;left:0;right:0;bottom:0}
  #panel{position:absolute;top:16px;left:16px;z-index:1000;background:#fff;padding:16px 20px;

  #panel h2{margin:0 0 10px;font-size:16px}

  #qbtn{position:absolute;top:60px;right:16px;z-index:1000;background:#fff;border:none;padding:10px 16px;
    border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.15);cursor:pointer;font-size:14px;font-family:inherit}
  #qbtn:hover{background:#f5f5f5}
  #modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}

  #modal{background:#fff;border-radius:14px;padding:24px 28px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);font-size:13px}

  #modal .row2{display:flex;gap:10px}
  #modal .row2>*{flex:1}

  #modal .btn-copy{background:#e8e8e8}

  #loading-overlay.hidden{display:none}
  #loading-overlay .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
  #loading-overlay .text{color:#fff;font-size:14px;font-weight:500}

  #playbar.show{display:flex;align-items:center;gap:12px}
  #playbar button{background:none;border:1px solid #ddd;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit}
  #playbar button.active{background:#333;color:#fff;border-color:#333}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>
<script src="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.js"></script>
<script src="https://unpkg.com/deck.gl@9.1.4/dist.min.js"></script>
<script>
// ===== Leaflet 지도 초기화 =====
const map=L.map('map',{zoomControl:false,zoomAnimation:false,fadeAnimation:false}).setView([37.51,127.1],13);
L.control.zoom({position:'bottomright'}).addTo(map);
const MAP_TILES={
  light:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  dark:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  voyager:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  satellite:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
};
let currentTileLayer=L.tileLayer(MAP_TILES.light,{maxZoom:19}).addTo(map);

// 미니맵
const miniTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19});
new L.Control.MiniMap(miniTile,{toggleDisplay:true,minimized:false,position:'bottomleft',width:160,height:160,zoomLevelOffset:-5}).addTo(map);

// OSRM 서버 연결 체크
(async function checkOSRM(){
  const overlay=document.getElementById('loading-overlay');
  for(let i=0;i<30;i++){
    try{
      const r=await fetch('https://solebal.synology.me:5052/route/v1/driving/127.1,37.5;127.2,37.5?overview=false');
      const j=await r.json();
      if(j.code==='Ok'){overlay.classList.add('hidden');return;}
    }catch(e){}
    await new Promise(ok=>setTimeout(ok,2000));
  }
  overlay.querySelector('.text').textContent='!! OSRM 서버 연결 실패. 페이지를 새로고침 해주세요.';
})();

const statusEl=document.getElementById('status');
const countEl=document.getElementById('count');
const tooltipEl=document.getElementById('deck-tooltip');
let _generationId=0; // 새 CSV 로드 시 증가 → 이전 애니메이션 중단
let _skipAnimation=false; // 탭 복귀 시 true → 애니메이션 즉시 완료
let _rendering=false; // 렌더링 중 여부
const SCALE=10000/3600000;
const BREAK_PROB=0.02;
const MAX_LINE_LEN=50;
const PATH_WIDTH=5;
const DOT_RADIUS=2.5;
const ENDPOINT_RADIUS=4.5;
const OUTLINE_ADD=3;

// ===== 색상 팔레트 =====
const PALETTE=['#4dd0e1','#81c784','#aed581','#fff176','#4fc3f7','#80deea','#a5d6a7','#c5e1a5','#dce775','#fff59d',
  '#f48fb1','#ce93d8','#b39ddb','#9fa8da','#90caf9','#80cbc4','#ef9a9a','#ffcc80','#ffe082','#ffab91',
  '#7986cb','#64b5f6','#4db6ac','#ff8a65','#ba68c8','#f06292','#ffd54f','#81d4fa','#ffb74d','#e57373',
  '#e53935','#d81b60','#8e24aa','#5e35b1','#3949ab','#1e88e5','#039be5','#00acc1','#00897b','#43a047',
  '#7cb342','#c0ca33','#fdd835','#ffb300','#fb8c00','#f4511e','#6d4c41','#546e7a','#78909c','#26a69a',
  '#ec407a','#ab47bc','#7e57c2','#5c6bc0','#42a5f5','#26c6da','#66bb6a','#9ccc65','#d4e157','#ffee58'];
function randColor(){return PALETTE[Math.floor(Math.random()*PALETTE.length)];}

// 무지개 팔레트 (HSL 기반, 인덱스/총수로 균등 분배)
function rainbowColor(i,total){
  const hue=Math.round((i/Math.max(total,1))*360)%360;
  return 'hsl('+hue+',75%,55%)';
}

// 테마별 색상 반환
function getThemeColor(i,total){
  const theme=document.getElementById('t-line').value;
  if(theme==='rainbow') return rainbowColor(i,total);
  if(theme==='mint') return '#0CEFD3';
  return randColor();
}

// HSL 문자열 → [r,g,b]
function hslToRgb(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}

// 색상 hex/hsl -> [r,g,b]
function hexToRgb(hex){
  if(hex.startsWith('hsl')){
    const m=hex.match(/hsl\((\d+),\s*(\d+)%?,\s*(\d+)%?\)/);
    if(m) return hslToRgb(+m[1],+m[2],+m[3]);
  }
  const n=parseInt(hex.slice(1),16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}

// ===== 유틸리티 =====
function parseTS(s){if(!s)return null;return new Date(s.replace(' ','T').replace(/\.?\d{0,6}$/,''))}
function fmtDur(ms){const m=Math.round(ms/60000);return m<60?m+'분':Math.floor(m/60)+'시간 '+m%60+'분'}
function parseCSV(text){
  const lines=text.trim().split('\n');
  const header=lines[0].replace(/["\uFEFF]/g,'').split(',');
  return lines.slice(1).map(line=>{
    const vals=line.replace(/"/g,'').split(',');
    const obj={};header.forEach((h,i)=>obj[h.trim()]=vals[i]?.trim());return obj;
  });
}

// ===== OSRM 라우팅 + 캐시 =====
const routeCache={};
async function getRoute(slat,slon,dlat,dlon){
  const key=slat+','+slon+','+dlat+','+dlon;
  if(routeCache[key]) return JSON.parse(JSON.stringify(routeCache[key]));
  for(let attempt=0;attempt<3;attempt++){
    try{
      const r=await fetch('https://solebal.synology.me:5052/route/v1/driving/'+slon+','+slat+';'+dlon+','+dlat+'?overview=full&geometries=polyline');
      const j=await r.json();
      if(j.code==='Ok'){
        const result={coords:polyline.decode(j.routes[0].geometry).map(c=>[c[0],c[1]]),dist:j.routes[0].distance};
        routeCache[key]=result;
        return JSON.parse(JSON.stringify(result));
      }
    }catch(e){console.warn('OSRM retry '+(attempt+1)+'/3:',e);}
    await new Promise(ok=>setTimeout(ok,500*(attempt+1)));
  }
  return null;
}

// 경로에 랜덤 오프셋 적용 (겹침 방지)
function offsetCoords(coords){
  const dx=(Math.random()-0.5)*0.0003;
  const dy=(Math.random()-0.5)*0.0003;
  return coords.map(c=>[c[0]+dy,c[1]+dx]);
}

// 두 좌표 사이 거리 (미터 근사)
function approxDist(a,b){
  const dlat=(b[0]-a[0])*111320;
  const dlon=(b[1]-a[1])*111320*Math.cos(a[0]*Math.PI/180);
  return Math.sqrt(dlat*dlat+dlon*dlon);
}

// 두 좌표 사이를 보간하여 점 배열 생성
function interpolateDots(from,to,congestion){
  const dist=approxDist(from,to);
  if(dist<1) return [from];
  const baseGap=8+Math.random()*12;
  const gap=Math.max(2, baseGap*(1-congestion*0.85));
  const n=Math.max(1, Math.floor(dist/gap));
  const pts=[];
  for(let k=0;k<=n;k++){
    const t=k/n;
    const jt=k===0||k===n ? t : t+(Math.random()-0.5)*0.3/n;
    pts.push([from[0]+(to[0]-from[0])*jt, from[1]+(to[1]-from[1])*jt]);
  }
  return pts;
}

// 세그먼트 빌더: 선 구간 + 점 구간
function buildSegments(coords){
  const segs=[];
  let i=0;
  while(i<coords.length){
    if(i>0 && Math.random()<BREAK_PROB){
      const n=2+Math.floor(Math.random()*5);
      const end=Math.min(i+n,coords.length);
      const congestion=Math.random();
      const dots=[];
      for(let d=i;d<end-1;d++){
        const seg=interpolateDots(coords[d],coords[d+1],congestion);
        dots.push(...(dots.length?seg.slice(1):seg));
      }
      if(dots.length===0) dots.push(coords[i]);
      segs.push({type:'dots',coords:dots});
      i=end-1;
    } else {
      const maxLen=Math.floor(5+Math.random()*MAX_LINE_LEN);
      const end=Math.min(i+maxLen,coords.length);
      if(end-i>=2){
        segs.push({type:'line',coords:coords.slice(i,end)});
        i=end-1;
      } else {
        segs.push({type:'dots',coords:[coords[i]]});
        i++;
      }
    }
    if(i<=0)i=1;
  }
  return segs;
}

// ===== deck.gl 데이터 저장소 =====
// pathData: [{id, path, color, width, tipText, groupId, groupOrder}]
// dotData: [{position, color, radius, tipText, groupId, groupOrder}]
// endpointData: [{position, color, radius, tipText, groupId, groupOrder, label}]
let pathData=[];
let dotData=[];
let endpointData=[];
let hoveredGroupId=null;
let clickedGroupId=null;
let routeMetadata={};  // groupId -> {coords, color, tipText, durationMs}
let groupOrderCounter=0;
let groupOrderMap={};  // groupId -> order number

// deck.gl 레이어 업데이트 (throttle + visibility 가드)
let _deckUpdatePending=false;
let _lastDeckUpdate=0;
let _deckTrailingTimer=0;
let _deckRevision=0; // 데이터 변경 감지용 리비전 카운터
const DECK_UPDATE_MIN_INTERVAL=30; // ms
function scheduleDeckUpdate(){
  if(_deckUpdatePending) return;
  if(document.hidden) return; // 탭 비활성 → 스킵
  _deckUpdatePending=true;
  requestAnimationFrame(()=>{
    _deckUpdatePending=false;
    const now=performance.now();
    const elapsed=now-_lastDeckUpdate;
    if(elapsed>=DECK_UPDATE_MIN_INTERVAL){
      _lastDeckUpdate=now;
      updateDeckLayers();
    } else {
      // throttle에 걸림 → trailing 타이머로 보장
      if(!_deckTrailingTimer){
        _deckTrailingTimer=setTimeout(()=>{
          _deckTrailingTimer=0;
          _lastDeckUpdate=performance.now();
          updateDeckLayers();
        }, DECK_UPDATE_MIN_INTERVAL-elapsed);
      }
    }
  });
}

function updateDeckLayers(){
  if(!window.deckOverlay) return;
  if(pathData.length===0&&dotData.length===0&&endpointData.length===0){
    window.deckOverlay.setProps({layers:[],viewState:getLeafletViewState()});
    return;
  }
  const hl=hoveredGroupId||clickedGroupId;
  const z=map.getZoom();
  const sc=Math.pow(2,(z-14)*0.4);
  const rev=++_deckRevision;

  // 타입별 통합 레이어 4개
  const layers=[];

  // 매번 새 배열 참조를 넘겨야 deck.gl이 데이터 변경을 감지함
  const curPath=[...pathData];
  const curDot=[...dotData];
  const curEp=[...endpointData];

  if(curPath.length){
    layers.push(new deck.PathLayer({
      id:'outline-all',
      data:curPath,
      getPath:d=>d.path,
      getColor:d=>{
        if(hl && d.groupId===hl) return [255,255,255,255];
        if(hl) return [85,85,85,140];
        return [85,85,85,255];
      },
      getWidth:d=>{
        if(hl && d.groupId===hl) return (d.width*2+OUTLINE_ADD+2)*sc;
        return (d.width+OUTLINE_ADD)*sc;
      },
      widthUnits:'pixels',widthMinPixels:1,widthMaxPixels:40,
      jointRounded:true,capRounded:true,pickable:false,
      updateTriggers:{getColor:[hl],getWidth:[hl,sc],getPath:[rev]}
    }));
    layers.push(new deck.PathLayer({
      id:'path-all',
      data:curPath,
      getPath:d=>d.path,
      getColor:d=>{
        if(hl && d.groupId===hl) return [...d.color,255];
        if(hl) return [...d.color,160];
        return [...d.color,255];
      },
      getWidth:d=>{
        if(hl && d.groupId===hl) return d.width*2*sc;
        return d.width*sc;
      },
      widthUnits:'pixels',widthMinPixels:1,widthMaxPixels:30,
      jointRounded:true,capRounded:true,pickable:true,autoHighlight:false,
      updateTriggers:{getColor:[hl],getWidth:[hl,sc],getPath:[rev]}
    }));
  }
  if(curDot.length){
    layers.push(new deck.ScatterplotLayer({
      id:'dot-all',
      data:curDot,
      getPosition:d=>d.position,
      getFillColor:d=>{
        if(hl && d.groupId===hl) return [...d.color,255];
        if(hl) return [...d.color,160];
        return [...d.color,255];
      },
      getRadius:d=>{
        if(hl && d.groupId===hl) return d.radius*1.5*sc;
        return d.radius*sc;
      },
      radiusUnits:'pixels',radiusMinPixels:1,radiusMaxPixels:20,
      pickable:true,autoHighlight:false,
      getLineColor:[85,85,85,255],getLineWidth:1.5*sc,
      lineWidthUnits:'pixels',stroked:true,
      updateTriggers:{getFillColor:[hl],getRadius:[hl,sc]}
    }));
  }
  if(curEp.length){
    layers.push(new deck.ScatterplotLayer({
      id:'ep-all',
      data:curEp,
      getPosition:d=>d.position,
      getFillColor:d=>{
        if(hl && d.groupId===hl) return [...d.color,255];
        if(hl) return [...d.color,160];
        return [...d.color,255];
      },
      getRadius:d=>{
        if(hl && d.groupId===hl) return d.radius*1.8*sc;
        return d.radius*sc;
      },
      radiusUnits:'pixels',radiusMinPixels:1,radiusMaxPixels:24,
      pickable:true,autoHighlight:false,
      getLineColor:d=>{
        if(hl && d.groupId===hl) return [255,255,255,255];
        return [85,85,85,255];
      },
      getLineWidth:d=>{
        if(hl && d.groupId===hl) return 3*sc;
        return 1.5*sc;
      },
      lineWidthUnits:'pixels',stroked:true,
      updateTriggers:{getFillColor:[hl],getRadius:[hl,sc],getLineColor:[hl],getLineWidth:[hl,sc]}
    }));
  }

  window.deckOverlay.setProps({layers,viewState:getLeafletViewState()});
}

// ===== deck.gl Leaflet 오버레이 초기화 (수동 동기화) =====
const deckContainer=document.createElement('div');
deckContainer.id='deck-canvas';
deckContainer.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:450;';
map.getContainer().appendChild(deckContainer);

function getLeafletViewState(){
  const c=map.getCenter();
  const size=map.getSize();
  // Leaflet zoom은 deck.gl보다 1 높음
  return{longitude:c.lng,latitude:c.lat,zoom:map.getZoom()-1,pitch:0,bearing:0};
}

window.deckOverlay=new deck.Deck({
  parent:deckContainer,
  initialViewState:getLeafletViewState(),
  controller:false,
  layers:[],
  width:'100%',
  height:'100%',
  pickingRadius:8,
  getTooltip:null,
  getCursor:({isHovering})=>isHovering?'pointer':'inherit',
  onHover:info=>{
    if(info.object){
      hoveredGroupId=info.object.groupId;
      tooltipEl.style.display='block';
      tooltipEl.style.left=(info.x+12)+'px';
      tooltipEl.style.top=(info.y-12)+'px';
      tooltipEl.textContent=info.object.tipText+(info.object.label?' '+info.object.label:'');
    }else{
      hoveredGroupId=null;
      tooltipEl.style.display='none';
    }
    updateDeckLayers();
  },
  onClick:info=>{
    if(info.object){
      clickedGroupId=info.object.groupId;
      replayRoute(info.object.groupId);
    }else{
      clickedGroupId=null;
      updateDeckLayers();
    }
  },
  onAfterRender:()=>{
    // deck.gl이 자체 canvas를 생성하므로 pointer-events 설정
    const c=deckContainer.querySelector('canvas');
    if(c&&c.style.pointerEvents!=='none') c.style.pointerEvents='none';
  }
});

// 탭 복귀 시 진행 중 애니메이션 즉시 완료 → rAF 폭주 방지
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    _skipAnimation=true;
    // 다음 프레임에서 플래그 해제 (복귀 후 새로 시작되는 애니메이션은 정상 재생)
    requestAnimationFrame(()=>{

      updateDeckLayers();
    });
  }

// ===== 경로 리플레이 (클릭 시 재애니메이션) =====
function replayRoute(gid){
  const meta=routeMetadata[gid];
  if(!meta||meta._replaying) return;
  meta._replaying=true;

  // 기존 데이터 제거
  pathData=pathData.filter(d=>d.groupId!==gid);
  dotData=dotData.filter(d=>d.groupId!==gid);
  endpointData=endpointData.filter(d=>d.groupId!==gid);

  // 다시 애니메이션
  const {coords,color,tipText,durationMs}=meta;
  animateRouteInternal(coords,color,durationMs,gid,tipText).then(()=>{
    meta._replaying=false;
  });
}

// ===== 경로 애니메이션 (deck.gl 데이터 점진적 추가) =====
function animateRouteInternal(origCoords,colorHex,durationMs,gid,tipText){
  const gen=_generationId; // 캡처: 이 애니메이션이 속한 세대
  const coords=offsetCoords(origCoords);
  const rgb=hexToRgb(colorHex);
  const segs=buildSegments(coords);
  const totalPts=segs.reduce((s,seg)=>s+seg.coords.length,0);

  // 그룹 순서 등록
  if(!(gid in groupOrderMap)) groupOrderMap[gid]=groupOrderCounter++;

  // 메타데이터 저장/갱신
  routeMetadata[gid]={coords:origCoords,color:colorHex,tipText,durationMs};

  // 시작점 추가
  endpointData.push({
    position:[coords[0][1],coords[0][0]],
    color:rgb,radius:ENDPOINT_RADIUS,
    tipText:tipText,label:'가게',groupId:gid
  });
  scheduleDeckUpdate();

  return new Promise(resolve=>{
    let segIdx=0;
    let pathIdCounter=0;

    function drawNext(){
      if(gen!==_generationId) return resolve(); // 새 CSV 로드됨 → 중단
      if(segIdx>=segs.length){
        // 끝점 추가
        const ec=coords[coords.length-1];
        endpointData.push({
          position:[ec[1],ec[0]],
          color:rgb,radius:ENDPOINT_RADIUS,
          tipText:tipText,label:'배달지',groupId:gid
        });
        scheduleDeckUpdate();
        resolve();
        return;
      }

      const seg=segs[segIdx];segIdx++;

      if(seg.type==='line'){
        // 랜덤 dash 배열 생성
        const dashes=[];
        for(let d=0;d<15;d++){dashes.push(1+Math.random()*3);dashes.push(1+Math.random()*2);}
        const dashArr=[dashes.reduce((a,b)=>a+b,0)*0.5, dashes.reduce((a,b)=>a+b,0)*0.15];

        const pathId=gid+'_p'+(pathIdCounter++);
        const fullPath=seg.coords.map(c=>[c[1],c[0]]);
        let di=2; // 최소 2점으로 시작

        // 경로 데이터 추가 (처음 2점)
        const pathObj={
          id:pathId,path:fullPath.slice(0,di),
          color:rgb,width:PATH_WIDTH,
          tipText:tipText,groupId:gid,
          dashArray:dashArr
        };
        pathData.push(pathObj);

        const segDur=Math.max(durationMs*(seg.coords.length/totalPts),50);
        const sStart=performance.now();

        function stepLine(now){
          if(gen!==_generationId) return resolve();
          if(_skipAnimation){
            pathObj.path=fullPath;
            scheduleDeckUpdate();
            drawNext();
            return;
          }
          const t=Math.min((now-sStart)/segDur,1);
          const target=Math.min(Math.floor(t*(fullPath.length-1))+1, fullPath.length);
          if(target>di){
            di=target;
            pathObj.path=fullPath.slice(0,di);
            scheduleDeckUpdate();
          }
          if(t<1) requestAnimationFrame(stepLine);
          else{
            pathObj.path=fullPath;
            scheduleDeckUpdate();
            drawNext();
          }
        }
        requestAnimationFrame(stepLine);
      } else {
        // 도트 구간
        let di=0;
        const segDur=Math.max(durationMs*(seg.coords.length/totalPts)*1.5,50);
        const sStart=performance.now();

        function stepDots(now){
          if(gen!==_generationId) return resolve();
          if(_skipAnimation){
            while(di<seg.coords.length){
              dotData.push({
                position:[seg.coords[di][1],seg.coords[di][0]],
                color:rgb,radius:DOT_RADIUS,
                tipText:tipText,groupId:gid
              });
              di++;
            }
            scheduleDeckUpdate();
            drawNext();
            return;
          }
          const t=Math.min((now-sStart)/segDur,1);
          const target=Math.floor(t*(seg.coords.length-1));
          while(di<=target&&di<seg.coords.length){
            dotData.push({
              position:[seg.coords[di][1],seg.coords[di][0]],
              color:rgb,radius:DOT_RADIUS,
              tipText:tipText,groupId:gid
            });
            di++;
          }
          scheduleDeckUpdate();
          if(t<1) requestAnimationFrame(stepDots);
          else{
            while(di<seg.coords.length){
              dotData.push({
                position:[seg.coords[di][1],seg.coords[di][0]],
                color:rgb,radius:DOT_RADIUS,
                tipText:tipText,groupId:gid
              });
              di++;
            }
            scheduleDeckUpdate();
            drawNext();
          }
        }
        requestAnimationFrame(stepDots);
      }
    }
    drawNext();
  });
}

// ===== CSV 파일 처리 =====
document.getElementById('file').addEventListener('change',async(e)=>{
  const file=e.target.files[0];if(!file)return;

  // 렌더링 시작 → 테마 패널 비활성화
  _rendering=true;
  document.getElementById('theme-panel').classList.add('disabled');

  // 기존 데이터 초기화
  _generationId++; // 이전 애니메이션 + fetch 모두 중단
  pathData=[];dotData=[];endpointData=[];
  hoveredGroupId=null;clickedGroupId=null;
  routeMetadata={};
  groupOrderCounter=0;groupOrderMap={};
  updateDeckLayers();

  const text=await file.text();
  let rows=parseCSV(text).filter(r=>r.shop_lat&&r.dlvry_lat);
  rows.forEach(r=>{r._pickup=parseTS(r.pick_up_date);r._handover=parseTS(r.hand_over_date);});
  const total=rows.length;
  // 셔플
  for(let i=rows.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rows[i],rows[j]]=[rows[j],rows[i]];}
  let done=0,fitted=false;
  statusEl.textContent=total+'건 처리 중...';

  async function fetchAndDraw(r,i){
    if(gen!==_generationId) return; // 새 CSV 로드됨 → 무시
    const slat=parseFloat(r.shop_lat),slon=parseFloat(r.shop_lon);
    const dlat=parseFloat(r.dlvry_lat),dlon=parseFloat(r.dlvry_lon);
    const rt=await getRoute(slat,slon,dlat,dlon);
    if(!rt){done++;countEl.textContent=done+'/'+total+'건';if(done===total){statusEl.textContent='완료 '+total+'건!';_rendering=false;document.getElementById('theme-panel').classList.remove('disabled');}return;}
    rt.coords[0]=[slat,slon];rt.coords[rt.coords.length-1]=[dlat,dlon];
    if(!fitted){map.fitBounds(rt.coords.map(c=>[c[0],c[1]]),{padding:[120,120],maxZoom:13});fitted=true;}
    let animDur=2000,durText='';
    if(r._pickup&&r._handover){const dur=r._handover-r._pickup;animDur=Math.max(dur*SCALE,300);durText=fmtDur(dur);}
    const color=getThemeColor(i,total);
    const gid='g'+i;
    const tip='#'+(i+1)+' '+Math.round(rt.dist)+'m'+(durText?' / '+durText:'');
    animateRouteInternal(rt.coords,color,animDur,gid,tip);
    done++;countEl.textContent=done+'/'+total+'건';
    if(done===total){statusEl.textContent='완료 '+total+'건!';_rendering=false;document.getElementById('theme-panel').classList.remove('disabled');}
  }

  const gen=_generationId;
  const queue=[...rows.entries()];
  await Promise.all(Array(Math.min(2,total)).fill(null).map(async()=>{
    while(queue.length){
      if(gen!==_generationId) return; // 새 CSV 로드됨 → fetch 중단
      const[i,r]=queue.shift();await fetchAndDraw(r,i);
    }
  }));
});

document.getElementById('q-limit').addEventListener('change',function(){
  if(parseInt(this.value)>100000) this.value=100000;
  if(parseInt(this.value)<1) this.value=1;
});
function generateQuery(){
  const rgn1=document.getElementById('q-rgn1').value;
  const rgn2=document.getElementById('q-rgn2').value;
  const dateFrom=document.getElementById('q-date-from').value;
  const dateTo=document.getElementById('q-date-to').value;
  const limit=document.getElementById('q-limit').value;
  const hourFrom=document.getElementById('q-hour-from').value;
  const hourTo=document.getElementById('q-hour-to').value;
  let where=[];
  if(dateFrom&&dateTo&&dateFrom===dateTo) where.push("part_date = '"+dateFrom+"'");
  else{
    if(dateFrom) where.push("part_date >= '"+dateFrom+"'");
    if(dateTo) where.push("part_date <= '"+dateTo+"'");
  }
  if(rgn2) where.push("dlvry_rgn2_cd = '"+rgn2+"'");
  else if(rgn1) where.push("dlvry_rgn1_cd = '"+rgn1+"'");
  if(hourFrom!==''&&hourTo!==''){
    const hf=parseInt(hourFrom),ht=parseInt(hourTo);
    if(hf<=ht) where.push("HOUR(pick_up_date) BETWEEN "+hf+" AND "+ht);
    else where.push("(HOUR(pick_up_date) >= "+hf+" OR HOUR(pick_up_date) <= "+ht+")");
  } else if(hourFrom!==''){
    where.push("HOUR(pick_up_date) >= "+parseInt(hourFrom));
  } else if(hourTo!==''){
    where.push("HOUR(pick_up_date) <= "+parseInt(hourTo));
  }
  where.push('pick_up_date IS NOT NULL');
  where.push('hand_over_date IS NOT NULL');
  const q='SELECT ord_no, shop_lat, shop_lon, dlvry_lat, dlvry_lon, pick_up_date, hand_over_date\nFROM sbbi.bm_delivery_time_period\nWHERE '+where.join('\n  AND ')+'\nLIMIT '+limit;
  document.getElementById('q-result').value=q;
}
function copyQuery(){
  const ta=document.getElementById('q-result');
  if(!ta.value) generateQuery();
  navigator.clipboard.writeText(ta.value).then(()=>{
    const btn=document.querySelector('.btn-copy');
    btn.textContent='복사됨!';setTimeout(()=>btn.textContent='복사',1500);
  });
}

let _rtActive=false;
let _rtPaused=false;
let _rtTimer=null;
let _rtCountdown=300;
let _rtInterval=300;
let _rtLastData=null;
const REALTIME_JSON_URL='output/realtime.json';

// 지역 좌표 범위 (lat_min, lat_max, lon_min, lon_max)
const REGION_BOUNDS={
  all:[33,39,124,132],
  seoul:[37.42,37.70,126.76,127.18],
  gangnam:[37.47,37.53,127.01,127.09],
  songpa:[37.49,37.53,127.08,127.15],
  seocho:[37.46,37.51,126.97,127.06],
  mapo:[37.53,37.58,126.89,126.96],
  yeongdeungpo:[37.50,37.55,126.88,126.93],
  busan:[35.05,35.25,128.90,129.25],
  incheon:[37.35,37.60,126.55,126.80],
  daegu:[35.80,35.95,128.50,128.75]
};

function getRegionFilter(){
  return REGION_BOUNDS[document.getElementById('rt-region').value]||REGION_BOUNDS.all;
}

function filterByRegion(deliveries){
  const[latMin,latMax,lonMin,lonMax]=getRegionFilter();
  return deliveries.filter(d=>
    d.shop_lat>=latMin&&d.shop_lat<=latMax&&
    d.shop_lon>=lonMin&&d.shop_lon<=lonMax
  );
}

function onRegionChange(){
  // 지역 변경 시 즉시 재렌더링 (마지막 데이터 기준)
  if(_rtLastData&&_rtLastData.deliveries){
    const filtered=filterByRegion(_rtLastData.deliveries);
    document.getElementById('rt-count').textContent=filtered.length.toLocaleString()+'건';
    renderRealtimeData(filtered);
    // 지역에 맞게 지도 이동
    const bounds=getRegionFilter();
    map.fitBounds([[bounds[0],bounds[2]],[bounds[1],bounds[3]]],{padding:[60,60]});
  }
}

function toggleRealtime(){
  _rtActive=!_rtActive;
  const panel=document.getElementById('realtime-panel');
  const toggle=document.getElementById('rt-toggle');
  const qbtn=document.getElementById('qbtn');
  if(_rtActive){
    panel.classList.add('show');
    toggle.style.display='none';
    qbtn.style.display='none';
    startRealtimePolling();
  }else{
    panel.classList.remove('show');
    toggle.style.display='flex';
    qbtn.style.display='block';
    stopRealtimePolling();
  }
}

function startRealtimePolling(){
  _rtPaused=false;
  _rtCountdown=0;
  updateTimerDisplay();
  if(_rtTimer) clearInterval(_rtTimer);
  _rtTimer=setInterval(tickRealtime,1000);
  tickRealtime();
}

function stopRealtimePolling(){
  if(_rtTimer){clearInterval(_rtTimer);_rtTimer=null;}
  document.getElementById('rt-dot').className='rt-dot paused';
  document.getElementById('rt-updated').textContent='중지됨';
}

function togglePause(){
  _rtPaused=!_rtPaused;
  const btn=document.getElementById('rt-btn-pause');
  const dot=document.getElementById('rt-dot');
  if(_rtPaused){
    btn.textContent='▶ 재개';
    dot.className='rt-dot paused';
  }else{
    btn.textContent='⏸ 일시정지';
    dot.className='rt-dot';
  }
}

function manualRefresh(){
  _rtCountdown=0;
  tickRealtime();
}

function tickRealtime(){
  if(_rtPaused) return;
  if(_rtCountdown<=0){
    _rtCountdown=_rtInterval;
    fetchRealtimeData();
  }else{
    _rtCountdown--;
  }
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const m=Math.floor(_rtCountdown/60);
  const s=_rtCountdown%60;
  document.getElementById('rt-timer').textContent=m+':'+String(s).padStart(2,'0');
}

async function fetchRealtimeData(){
  const dot=document.getElementById('rt-dot');
  const updated=document.getElementById('rt-updated');
  try{
    const resp=await fetch(REALTIME_JSON_URL+'?t='+Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const isNew=!_rtLastData||_rtLastData.updated_at!==data.updated_at;
    _rtLastData=data;
    document.getElementById('rt-count').textContent=data.count.toLocaleString()+'건';
    const updTime=new Date(data.updated_at);
    updated.textContent='마지막 갱신: '+updTime.toLocaleTimeString('ko-KR');
    dot.className='rt-dot';
    if(isNew&&data.deliveries&&data.deliveries.length>0){
      const filtered=filterByRegion(data.deliveries);
      document.getElementById('rt-count').textContent=filtered.length.toLocaleString()+'건';
      const panel=document.getElementById('realtime-panel');
      panel.classList.remove('rt-flash');
      void panel.offsetWidth;
      panel.classList.add('rt-flash');
      showToast('🔄 '+filtered.length+'건 업데이트');
      renderRealtimeData(filtered);
    }
  }catch(e){
    dot.className='rt-dot error';
    updated.textContent='❌ 연결 실패: '+e.message;
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(()=>{t.style.display='none';},2500);
}

async function renderRealtimeData(deliveries){
  _generationId++;
  pathData=[];dotData=[];endpointData=[];
  hoveredGroupId=null;clickedGroupId=null;
  routeMetadata={};groupOrderCounter=0;groupOrderMap={};
  updateDeckLayers();

  // 이미 그린 주문 추적
  const drawn=new Set();
  const now=Date.now();
  const total=deliveries.length;
  statusEl.textContent='실시간: '+total+'건 렌더링 중...';
  countEl.textContent='';

  // 시간순 정렬 (픽업 시각 기준)
  deliveries.sort((a,b)=>(a.pickup_ts_ms||0)-(b.pickup_ts_ms||0));

  let done=0,fitted=false;
  const gen=_generationId;

  async function fetchAndDraw(d,i){
    if(gen!==_generationId) return;
    if(drawn.has(d.ord_no)) return;
    drawn.add(d.ord_no);

    const slat=d.shop_lat,slon=d.shop_lon,dlat=d.dlvry_lat,dlon=d.dlvry_lon;
    if(!slat||!dlat) return;
    const rt=await getRoute(slat,slon,dlat,dlon);
    if(!rt){done++;countEl.textContent=done+'/'+total;if(done===total)statusEl.textContent='실시간: '+total+'건 완료';return;}
    rt.coords[0]=[slat,slon];rt.coords[rt.coords.length-1]=[dlat,dlon];
    if(!fitted){
      const bounds=getRegionFilter();
      map.fitBounds([[bounds[0],bounds[2]],[bounds[1],bounds[3]]],{padding:[60,60]});
      fitted=true;
    }

    // 실제 시간 계산
    const pickupMs=d.pickup_ts_ms||now;
    // completed_ts는 "2026-05-15 09:07:34.282000+00:00" 형식 → KST로 파싱
    // log_ts는 실제로 KST인데 +00:00으로 표기됨 → 그대로 epoch 변환
    let completedMs=now;
    if(d.completed_ts){
      const ct=new Date(d.completed_ts.replace('+00:00','+09:00'));
      if(!isNaN(ct)) completedMs=ct.getTime();
    }
    const totalDuration=Math.max(completedMs-pickupMs,60000); // 최소 1분

    // 현재 시각 기준 진행률
    const elapsed=now-pickupMs;
    const progress=Math.min(Math.max(elapsed/totalDuration,0),1);

    // 애니메이션: 남은 시간만큼 실제 시간으로 그림
    const remainingMs=Math.max(totalDuration-elapsed,0);
    // 이미 완료된 건은 빠르게 (3초), 진행 중인 건은 남은 시간 그대로
    const animDur=progress>=1?3000:Math.max(remainingMs,3000);

    const color=getThemeColor(i,total);
    const gid='rt_'+d.ord_no;
    const method=d.delivery_method||'';
    const durMin=Math.round(totalDuration/60000);
    const tip=method+' '+Math.round(rt.dist)+'m / '+durMin+'분'+(d.is_single?' 단건':'');

    // 이미 진행된 부분은 즉시 그리기
    if(progress>0&&progress<1){
      const splitIdx=Math.floor(rt.coords.length*progress);
      const doneCoords=rt.coords.slice(0,splitIdx+1);
      const remainCoords=rt.coords.slice(splitIdx);
      // 완료 부분 즉시 렌더
      const rgb=hexToRgb(color);
      const donePath=doneCoords.map(c=>[c[1],c[0]]);
      if(donePath.length>=2){
        pathData.push({id:gid+'_done',path:donePath,color:rgb,width:PATH_WIDTH,tipText:tip,groupId:gid});
      }
      endpointData.push({position:[doneCoords[0][1],doneCoords[0][0]],color:rgb,radius:ENDPOINT_RADIUS,tipText:tip,label:'가게',groupId:gid});
      scheduleDeckUpdate();
      // 나머지 애니메이션
      if(remainCoords.length>=2){
        animateRouteInternal(remainCoords,color,animDur,gid+'_rem',tip);
      }
    }else if(progress>=1){
      // 이미 완료 → 빠르게 전체 그리기
      animateRouteInternal(rt.coords,color,animDur,gid,tip);
    }else{
      // 아직 시작 안 함 (거의 없겠지만)
      animateRouteInternal(rt.coords,color,animDur,gid,tip);
    }

    done++;countEl.textContent=done+'/'+total;
    if(done===total) statusEl.textContent='실시간: '+total+'건 완료';
  }

  const queue=[...deliveries.entries()];
  await Promise.all(Array(Math.min(3,total)).fill(null).map(async()=>{
    while(queue.length){
      if(gen!==_generationId) return;
      const[i,d]=queue.shift();await fetchAndDraw(d,i);
    }
  }));
}
</script>
