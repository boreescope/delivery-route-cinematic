<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>배달동선 스튜디오</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column}

#toolbar{height:44px;background:#16213e;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid #2a2a4a;flex-shrink:0}
#toolbar h1{font-size:14px;font-weight:600;color:#fff;margin-right:auto}
#toolbar button{background:#0f3460;color:#e0e0e0;border:1px solid #2a4a7a;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
#toolbar button:hover{background:#1a5276;border-color:#4a8abf}
#toolbar button.active{background:#1a5276;border-color:#4fc3f7;color:#4fc3f7}
#toolbar button.primary{background:#e94560;border-color:#e94560;color:#fff}
#toolbar button.primary:hover{background:#c0392b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#toolbar .sep{width:1px;height:24px;background:#2a2a4a}
#toolbar select{background:#0f3460;color:#e0e0e0;border:1px solid #2a4a7a;padding:5px 8px;border-radius:5px;font-size:12px;font-family:inherit}

#main{flex:1;display:flex;overflow:hidden}

#viewport{flex:1;position:relative;background:#000}
#map{width:100%;height:100%}
#rain-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;opacity:0;transition:opacity .5s}
#rain-canvas.active{opacity:1}
#viewport-overlay{position:absolute;top:8px;left:8px;z-index:10;font-size:11px;color:rgba(255,255,255,.9);pointer-events:none;background:rgba(0,0,0,.5);padding:5px 10px;border-radius:5px;font-family:'SF Mono',Monaco,monospace}
#rec-indicator{display:none;position:absolute;top:12px;right:12px;z-index:10;background:rgba(231,76,60,.9);color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;animation:pulse 1s infinite}
#camera-hint{position:absolute;bottom:12px;left:12px;z-index:10;font-size:11px;color:rgba(255,255,255,.4);pointer-events:none}

#scene-panel{width:320px;background:#16213e;border-left:1px solid #2a2a4a;display:flex;flex-direction:column;flex-shrink:0}
#scene-panel .sp-header{padding:12px 14px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;gap:8px}
#scene-panel .sp-header h3{font-size:13px;font-weight:600;flex:1}
#scene-panel .sp-header button{background:none;border:1px solid #2a4a7a;color:#aaa;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px}
#scene-panel .sp-header button:hover{background:#0f3460;color:#fff}
#scene-list{flex:1;overflow-y:auto;padding:8px}
.scene-card{background:#0f3460;border:1px solid #2a4a7a;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.scene-card:hover{border-color:#4a8abf}
.scene-card.active{border-color:#e94560;background:#1a1a3e}
.scene-card .sc-title{font-size:12px;font-weight:600;margin-bottom:4px}
.scene-card .sc-meta{font-size:10px;color:#888;display:flex;gap:6px;flex-wrap:wrap}
.scene-card .sc-actions{display:flex;gap:4px;margin-top:6px}
.scene-card .sc-actions button{background:none;border:1px solid #2a4a7a;color:#aaa;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px}
.scene-card .sc-actions button:hover{color:#fff;border-color:#4a8abf}
.scene-card .sc-actions button.del:hover{color:#e74c3c;border-color:#e74c3c}

#scene-editor{display:none;padding:12px 14px;border-top:1px solid #2a2a4a;background:#0d1b2a;max-height:340px;overflow-y:auto}
#scene-editor label{display:block;font-size:11px;color:#888;margin:8px 0 3px}
#scene-editor input,#scene-editor select{width:100%;background:#16213e;border:1px solid #2a4a7a;color:#e0e0e0;padding:6px 8px;border-radius:5px;font-size:12px;font-family:inherit}
#scene-editor .row{display:flex;gap:8px}
#scene-editor .row>*{flex:1}

#timeline{height:100px;background:#0d1b2a;border-top:1px solid #2a2a4a;display:flex;flex-direction:column;flex-shrink:0}
#tl-controls{height:32px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid #1a1a3e}
#tl-controls button{background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;padding:2px 6px}
#tl-controls button:hover{color:#fff}
#tl-controls .tl-time{font-size:11px;color:#888;min-width:100px}
#tl-controls .tl-duration{font-size:11px;color:#666;margin-left:auto}
#tl-track{flex:1;position:relative;overflow-x:auto;padding:8px 12px}
#tl-bar{height:100%;display:flex;align-items:stretch;gap:2px;min-width:100%}
.tl-segment{height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.8);cursor:pointer;min-width:40px;transition:all .15s}
.tl-segment:hover{filter:brightness(1.2)}
.tl-segment.active{outline:2px solid #e94560;outline-offset:1px}
#tl-playhead{position:absolute;top:0;bottom:0;width:2px;background:#e94560;z-index:10;pointer-events:none}

#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;display:none;pointer-events:none}

#export-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:5000;align-items:center;justify-content:center}
#export-modal.show{display:flex}
#export-modal .em-box{background:#16213e;border-radius:12px;padding:24px;width:420px;border:1px solid #2a4a7a}
#export-modal h3{font-size:15px;margin-bottom:16px}
#export-modal label{display:block;font-size:11px;color:#888;margin:10px 0 3px}
#export-modal input,#export-modal select{width:100%;background:#0f3460;border:1px solid #2a4a7a;color:#e0e0e0;padding:7px 10px;border-radius:6px;font-size:12px;font-family:inherit}
#export-modal .em-row{display:flex;gap:10px}
#export-modal .em-row>*{flex:1}
#export-modal .em-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
#export-modal .em-btns button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit}
#export-modal .btn-render{background:#e94560;color:#fff}
#export-modal .btn-render:hover{background:#c0392b}
#export-modal .btn-cancel{background:#2a2a4a;color:#aaa}
#export-modal .btn-cancel:hover{background:#3a3a5a}
</style>
</head><body>

<div id="toolbar">
  <h1>🎬 배달동선 스튜디오</h1>
  <input type="file" id="csv-file" accept=".csv" style="font-size:11px;max-width:160px">
  <div class="sep"></div>
  <select id="map-style" onchange="changeMapStyle(this.value)">
    <option value="dark-matter">🌑 다크매터</option>
    <option value="positron">⚪ 포지트론</option>
    <option value="voyager">🗺 보야저</option>
    <option value="dark-nolabel">🌑 다크 (라벨없음)</option>
    <option value="positron-nolabel">⚪ 라이트 (라벨없음)</option>
    <option value="osm-bright">🌍 OSM Bright</option>
    <option value="satellite">🛰 위성</option>
    <option value="toner">🖨 토너 (흑백)</option>
    <option value="watercolor">🎨 수채화</option>
  </select>
  <div class="sep"></div>
  <button id="btn-rain" onclick="toggleRain()">🌧 비</button>
  <div class="sep"></div>
  <button id="btn-preview" onclick="previewPlay()">▶ 미리보기</button>
  <button id="btn-stop" onclick="previewStop()">⏹ 정지</button>
  <div class="sep"></div>
  <button class="primary" onclick="showExportModal()">⏺ 렌더링</button>
</div>

<div id="main">
  <div id="viewport">
    <div id="map"></div>
    <canvas id="rain-canvas"></canvas>
    <div id="viewport-overlay"><span id="vp-info"></span></div>
    <div id="rec-indicator">⏺ REC</div>
    <div id="camera-hint">우클릭 드래그: 3D 회전 · Ctrl+드래그: pitch · 스크롤: 줌</div>
  </div>
  <div id="scene-panel">
    <div class="sp-header">
      <h3>씬 목록</h3>
      <button onclick="addScene()">+ 추가</button>
      <button onclick="captureCurrentAsScene()">📷 현재 뷰</button>
    </div>
    <div id="scene-list"></div>
    <div id="scene-editor">
      <label>씬 이름</label>
      <input id="se-name" placeholder="예: 강남역 드론뷰" oninput="updateSceneField('name',this.value)">
      <div class="row">
        <div><label>위도</label><input id="se-lat" type="number" step="0.0001" oninput="updateSceneField('lat',+this.value)"></div>
        <div><label>경도</label><input id="se-lng" type="number" step="0.0001" oninput="updateSceneField('lng',+this.value)"></div>
      </div>
      <div class="row">
        <div><label>줌</label><input id="se-zoom" type="number" min="5" max="20" step="0.1" oninput="updateSceneField('zoom',+this.value)"></div>
        <div><label>지속 (초)</label><input id="se-duration" type="number" min="0.5" max="60" step="0.5" oninput="updateSceneField('duration',+this.value)"></div>
      </div>
      <div class="row">
        <div><label>Pitch (0~85°)</label><input id="se-pitch" type="number" min="0" max="85" step="1" oninput="updateSceneField('pitch',+this.value)"></div>
        <div><label>Bearing (방향°)</label><input id="se-bearing" type="number" min="-180" max="360" step="1" oninput="updateSceneField('bearing',+this.value)"></div>
      </div>
      <div class="row">
        <div><label>전환 (초)</label><input id="se-transition" type="number" min="0" max="10" step="0.5" oninput="updateSceneField('transition',+this.value)"></div>
        <div><label>이징</label>
          <select id="se-easing" onchange="updateSceneField('easing',this.value)">
            <option value="ease-in-out">ease-in-out</option>
            <option value="ease-in">ease-in</option>
            <option value="ease-out">ease-out</option>
            <option value="linear">linear</option>
          </select>
        </div>
      </div>
      <label>동선 표시</label>
      <select id="se-routes" onchange="updateSceneField('showRoutes',this.value==='true')">
        <option value="true">표시</option>
        <option value="false">숨김</option>
      </select>
    </div>
  </div>
</div>

<div id="timeline">
  <div id="tl-controls">
    <button onclick="previewPlay()" title="재생">▶</button>
    <button onclick="previewStop()" title="정지">⏹</button>
    <button onclick="previewSeek(0)" title="처음으로">⏮</button>
    <span class="tl-time" id="tl-time">0:00.0 / 0:00.0</span>
    <button onclick="changeSpeed(-1)" title="느리게">−</button>
    <span id="tl-speed" style="font-size:11px;color:#e94560;min-width:36px;text-align:center;font-weight:600">1×</span>
    <button onclick="changeSpeed(1)" title="빠르게">+</button>
    <span class="tl-duration" id="tl-total"></span>
  </div>
  <div id="tl-track">
    <div id="tl-bar"></div>
    <div id="tl-playhead" style="left:0"></div>
  </div>
</div>

<div id="toast"></div>

<div id="export-modal">
  <div class="em-box">
    <h3>🎬 렌더링 설정</h3>
    <div class="em-row">
      <div><label>해상도</label>
        <select id="ex-resolution">
          <option value="1920x1080">1920×1080 (FHD)</option>
          <option value="3840x2160">3840×2160 (4K)</option>
          <option value="1280x720">1280×720 (HD)</option>
          <option value="1080x1920">1080×1920 (세로)</option>
        </select>
      </div>
      <div><label>FPS</label>
        <select id="ex-fps">
          <option value="30">30fps</option>
          <option value="60">60fps</option>
          <option value="24">24fps</option>
        </select>
      </div>
    </div>
    <label>출력 레이어</label>
    <select id="ex-layer">
      <option value="composite">지도+동선 합성</option>
      <option value="map">지도만</option>
      <option value="route">동선만 (투명배경)</option>
      <option value="separate">별도 파일 2개</option>
    </select>
    <div class="em-btns">
      <button class="btn-cancel" onclick="hideExportModal()">취소</button>
      <button class="btn-render" onclick="startRender()">렌더링 시작</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>
</body></html>

<script>
// ===== 지도 스타일 정의 =====
const MAP_STYLES = {
  'dark-matter': {
    version: 8, name: 'Dark Matter',
    sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
  },
  'positron': {
    version: 8, name: 'Positron',
    sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
  },
  'voyager': {
    version: 8, name: 'Voyager',
    sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
  },
  'dark-nolabel': {
    version: 8, name: 'Dark (No Labels)',
    sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
  },
  'positron-nolabel': {
    version: 8, name: 'Light (No Labels)',
    sources: { carto: { type: 'raster', tiles: ['https://basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
  },
  'osm-bright': {
    version: 8, name: 'OSM Bright',
    sources: { osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
  },
  'satellite': {
    version: 8, name: 'Satellite',
    sources: { esri: { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'esri', type: 'raster', source: 'esri' }]
  },
  'toner': {
    version: 8, name: 'Toner',
    sources: { stamen: { type: 'raster', tiles: ['https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}@2x.png'], tileSize: 256, maxzoom: 19 }},
    layers: [{ id: 'stamen', type: 'raster', source: 'stamen' }]
  },
  'watercolor': {
    version: 8, name: 'Watercolor',
    sources: { stamen: { type: 'raster', tiles: ['https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg'], tileSize: 256, maxzoom: 16 }},
    layers: [{ id: 'stamen', type: 'raster', source: 'stamen' }]
  }
};

// ===== MapLibre GL 초기화 =====
const map = new maplibregl.Map({
  container: 'map',
  style: MAP_STYLES['dark-matter'],
  center: [127.0500, 37.5050],
  zoom: 12,
  pitch: 45,
  bearing: -10,
  antialias: true,
  preserveDrawingBuffer: true
});
map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

function changeMapStyle(key) {
  const style = MAP_STYLES[key];
  if (!style) return;
  map.setStyle(style);
  map.once('style.load', () => { addRouteLayers(); });
}

// 뷰포트 정보 업데이트
function updateVPInfo() {
  const c = map.getCenter();
  const z = map.getZoom().toFixed(1);
  const p = map.getPitch().toFixed(0);
  const b = map.getBearing().toFixed(0);
  document.getElementById('vp-info').textContent = `${c.lat.toFixed(4)}, ${c.lng.toFixed(4)} | z${z} | pitch ${p}° | bearing ${b}°`;
}
map.on('move', updateVPInfo);
map.on('pitch', updateVPInfo);
map.on('rotate', updateVPInfo);
updateVPInfo();

// ===== 전역 상태 =====
let scenes = [];
let activeSceneIdx = -1;
let routeGeoJSON = { type: 'FeatureCollection', features: [] };
let endpointGeoJSON = { type: 'FeatureCollection', features: [] };
let isPlaying = false;
let playStartTime = 0;
let playElapsed = 0;
let playRAF = null;
let playbackSpeed = 1;
const SPEED_STEPS = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4, 6, 8];
let isRecording = false;
let mediaRecorders = [];
let recordedChunks = {};

// ===== 경로 데이터 (GeoJSON으로 MapLibre에 추가) =====
const PALETTE = ['#4dd0e1','#81c784','#f48fb1','#ce93d8','#fff176','#4fc3f7','#aed581','#ffcc80','#90caf9','#ef9a9a',
  '#80deea','#a5d6a7','#b39ddb','#9fa8da','#c5e1a5','#dce775','#fff59d','#ffe082','#ffab91','#80cbc4'];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].replace(/["\uFEFF]/g, '').split(',');
  return lines.slice(1).map(line => {
    const vals = line.replace(/"/g, '').split(',');
    const obj = {};
    header.forEach((h, i) => obj[h.trim()] = vals[i]?.trim());
    return obj;
  });
}

async function getRoute(slat, slon, dlat, dlon) {
  try {
    const r = await fetch(`https://solebal.synology.me:5052/route/v1/driving/${slon},${slat};${dlon},${dlat}?overview=full&geometries=polyline`);
    const j = await r.json();
    if (j.code === 'Ok') return { coords: polyline.decode(j.routes[0].geometry), dist: j.routes[0].distance };
  } catch (e) {}
  return null;
}

document.getElementById('csv-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  toast('CSV 로딩 중...');
  const text = await file.text();
  let rows = parseCSV(text).filter(r => r.shop_lat && r.dlvry_lat);
  if (rows.length > 300) rows = rows.slice(0, 300);

  routeGeoJSON = { type: 'FeatureCollection', features: [] };
  endpointGeoJSON = { type: 'FeatureCollection', features: [] };
  let done = 0;

  for (const [i, r] of rows.entries()) {
    const slat = parseFloat(r.shop_lat), slon = parseFloat(r.shop_lon);
    const dlat = parseFloat(r.dlvry_lat), dlon = parseFloat(r.dlvry_lon);
    const rt = await getRoute(slat, slon, dlat, dlon);
    if (!rt) continue;

    const color = PALETTE[i % PALETTE.length];
    const coords = rt.coords.map(c => [c[1], c[0]]);
    routeGeoJSON.features.push({
      type: 'Feature',
      properties: { color, id: i },
      geometry: { type: 'LineString', coordinates: coords }
    });
    endpointGeoJSON.features.push(
      { type: 'Feature', properties: { color, type: 'shop', routeId: i }, geometry: { type: 'Point', coordinates: [slon, slat] }},
      { type: 'Feature', properties: { color, type: 'delivery', routeId: i }, geometry: { type: 'Point', coordinates: [dlon, dlat] }}
    );
    done++;
    if (done % 20 === 0) { toast(`경로 로딩: ${done}/${rows.length}`); addRouteLayers(); }
  }

  addRouteLayers();
  if (routeGeoJSON.features.length > 0) {
    const bounds = new maplibregl.LngLatBounds();
    routeGeoJSON.features.forEach(f => f.geometry.coordinates.forEach(c => bounds.extend(c)));
    map.fitBounds(bounds, { padding: 60, duration: 1000 });
  }
  toast(`${done}건 경로 로드 완료`);
});

function addRouteLayers() {
  if (map.getSource('routes')) {
    map.getSource('routes').setData(routeGeoJSON);
    map.getSource('endpoints').setData(endpointGeoJSON);
    return;
  }
  if (!map.isStyleLoaded()) { map.once('style.load', addRouteLayers); return; }

  map.addSource('routes', { type: 'geojson', data: routeGeoJSON });
  map.addSource('endpoints', { type: 'geojson', data: endpointGeoJSON });

  map.addLayer({
    id: 'routes-outline', type: 'line', source: 'routes',
    paint: { 'line-color': '#000', 'line-width': 6, 'line-opacity': 0.3 }
  });
  map.addLayer({
    id: 'routes-line', type: 'line', source: 'routes',
    paint: { 'line-color': ['get', 'color'], 'line-width': 3.5, 'line-opacity': 0.85 }
  });
  map.addLayer({
    id: 'endpoints-circle', type: 'circle', source: 'endpoints',
    paint: {
      'circle-radius': 5, 'circle-color': ['get', 'color'],
      'circle-stroke-width': 1.5, 'circle-stroke-color': '#222'
    }
  });
}

map.on('load', () => { addRouteLayers(); });

// ===== 씬 관리 =====
function addScene() {
  const c = map.getCenter();
  scenes.push({
    name: '씬 ' + (scenes.length + 1),
    lat: +c.lat.toFixed(5), lng: +c.lng.toFixed(5),
    zoom: +map.getZoom().toFixed(1),
    pitch: +map.getPitch().toFixed(0),
    bearing: +map.getBearing().toFixed(0),
    duration: 3, transition: 2, easing: 'ease-in-out', showRoutes: true
  });
  renderSceneList(); selectScene(scenes.length - 1); renderTimeline();
}

function captureCurrentAsScene() { addScene(); toast('현재 3D 뷰를 씬으로 추가'); }

function selectScene(idx) {
  activeSceneIdx = idx;
  renderSceneList();
  if (idx >= 0 && idx < scenes.length) {
    const s = scenes[idx];
    document.getElementById('se-name').value = s.name;
    document.getElementById('se-lat').value = s.lat;
    document.getElementById('se-lng').value = s.lng;
    document.getElementById('se-zoom').value = s.zoom;
    document.getElementById('se-duration').value = s.duration;
    document.getElementById('se-pitch').value = s.pitch;
    document.getElementById('se-bearing').value = s.bearing;
    document.getElementById('se-transition').value = s.transition;
    document.getElementById('se-easing').value = s.easing;
    document.getElementById('se-routes').value = s.showRoutes ? 'true' : 'false';
    document.getElementById('scene-editor').style.display = 'block';
    map.flyTo({ center: [s.lng, s.lat], zoom: s.zoom, pitch: s.pitch, bearing: s.bearing, duration: 1000 });
  } else {
    document.getElementById('scene-editor').style.display = 'none';
  }
}

function updateSceneField(field, value) {
  if (activeSceneIdx < 0) return;
  scenes[activeSceneIdx][field] = value;
  renderSceneList(); renderTimeline();
}

function deleteScene(idx) {
  scenes.splice(idx, 1);
  if (activeSceneIdx >= scenes.length) activeSceneIdx = scenes.length - 1;
  renderSceneList(); renderTimeline(); selectScene(activeSceneIdx);
}

function moveScene(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= scenes.length) return;
  [scenes[idx], scenes[newIdx]] = [scenes[newIdx], scenes[idx]];
  activeSceneIdx = newIdx;
  renderSceneList(); renderTimeline();
}

function renderSceneList() {
  document.getElementById('scene-list').innerHTML = scenes.map((s, i) => `
    <div class="scene-card ${i === activeSceneIdx ? 'active' : ''}" onclick="selectScene(${i})">
      <div class="sc-title">${s.name}</div>
      <div class="sc-meta">
        <span>${s.lat.toFixed(3)}, ${s.lng.toFixed(3)}</span>
        <span>z${s.zoom}</span>
        <span>p${s.pitch}°</span>
        <span>b${s.bearing}°</span>
        <span>${s.duration}s</span>
      </div>
      <div class="sc-actions">
        <button onclick="event.stopPropagation();moveScene(${i},-1)">↑</button>
        <button onclick="event.stopPropagation();moveScene(${i},1)">↓</button>
        <button onclick="event.stopPropagation();flyToScene(${i})">👁</button>
        <button class="del" onclick="event.stopPropagation();deleteScene(${i})">✕</button>
      </div>
    </div>`).join('');
}

function flyToScene(idx) {
  const s = scenes[idx];
  map.flyTo({ center: [s.lng, s.lat], zoom: s.zoom, pitch: s.pitch, bearing: s.bearing, duration: 1200 });
}

// ===== 타임라인 =====
function getTotalDuration() { return scenes.reduce((sum, s) => sum + s.duration + s.transition, 0); }

function renderTimeline() {
  const bar = document.getElementById('tl-bar');
  const total = getTotalDuration();
  const colors = ['#e94560','#0f3460','#533483','#1a5276','#6c3483','#1e8449','#d35400','#2980b9'];
  bar.innerHTML = scenes.map((s, i) => {
    const w = total > 0 ? ((s.duration + s.transition) / total * 100) : 0;
    return `<div class="tl-segment ${i === activeSceneIdx ? 'active' : ''}" style="width:${w}%;background:${colors[i % colors.length]}" onclick="selectScene(${i})">${s.name}</div>`;
  }).join('');
  document.getElementById('tl-total').textContent = `총 ${total.toFixed(1)}초`;
  updateTimeDisplay(playElapsed);
}

function updateTimeDisplay(elapsed) {
  const total = getTotalDuration();
  const fmt = t => { const m = Math.floor(t / 60); return `${m}:${(t % 60).toFixed(1).padStart(4, '0')}`; };
  document.getElementById('tl-time').textContent = `${fmt(elapsed)} / ${fmt(total)}`;
  const pct = total > 0 ? (elapsed / total * 100) : 0;
  document.getElementById('tl-playhead').style.left = Math.min(pct, 100) + '%';
}

// ===== 이징 =====
function easingFn(name, t) {
  switch (name) {
    case 'ease-in': return t * t * t;
    case 'ease-out': return 1 - Math.pow(1 - t, 3);
    case 'ease-in-out': return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    default: return t;
  }
}

// bearing 보간 (최단 경로)
function lerpBearing(from, to, t) {
  let diff = to - from;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  return from + diff * t;
}

// ===== 재생 =====
function getStateAtTime(t) {
  if (scenes.length === 0) return null;
  let elapsed = 0;
  for (let i = 0; i < scenes.length; i++) {
    const s = scenes[i];
    const segDur = s.duration + s.transition;
    if (t <= elapsed + segDur) {
      const localT = t - elapsed;
      if (localT <= s.transition && i > 0) {
        const prev = scenes[i - 1];
        const progress = s.transition > 0 ? easingFn(s.easing, localT / s.transition) : 1;
        return {
          lat: prev.lat + (s.lat - prev.lat) * progress,
          lng: prev.lng + (s.lng - prev.lng) * progress,
          zoom: prev.zoom + (s.zoom - prev.zoom) * progress,
          pitch: prev.pitch + (s.pitch - prev.pitch) * progress,
          bearing: lerpBearing(prev.bearing, s.bearing, progress),
          showRoutes: s.showRoutes, sceneIdx: i
        };
      }
      return { lat: s.lat, lng: s.lng, zoom: s.zoom, pitch: s.pitch, bearing: s.bearing, showRoutes: s.showRoutes, sceneIdx: i };
    }
    elapsed += segDur;
  }
  const last = scenes[scenes.length - 1];
  return { lat: last.lat, lng: last.lng, zoom: last.zoom, pitch: last.pitch, bearing: last.bearing, showRoutes: last.showRoutes, sceneIdx: scenes.length - 1 };
}

function previewPlay() {
  if (scenes.length === 0) { toast('씬을 추가하세요'); return; }
  if (isPlaying) return;
  isPlaying = true;
  const total = getTotalDuration();
  if (playElapsed >= total) playElapsed = 0;
  let lastTick = performance.now();

  function tick() {
    if (!isPlaying) return;
    const now = performance.now();
    const dt = (now - lastTick) / 1000 * playbackSpeed;
    lastTick = now;
    playElapsed += dt;
    if (playElapsed >= total) {
      playElapsed = total; isPlaying = false;
      updateTimeDisplay(playElapsed);
      setRouteProgress(1);
      if (isRecording) stopRecording();
      return;
    }
    const state = getStateAtTime(playElapsed);
    if (state) {
      map.jumpTo({ center: [state.lng, state.lat], zoom: state.zoom, pitch: state.pitch, bearing: state.bearing });
      if (state.showRoutes) {
        setRouteVisibility(true);
        setRouteProgress(playElapsed / total);
      } else {
        setRouteVisibility(false);
      }
    }
    updateTimeDisplay(playElapsed);
    playRAF = requestAnimationFrame(tick);
  }
  playRAF = requestAnimationFrame(tick);
}

function changeSpeed(dir) {
  const curIdx = SPEED_STEPS.indexOf(playbackSpeed);
  let newIdx = curIdx + dir;
  if (curIdx === -1) newIdx = dir > 0 ? SPEED_STEPS.findIndex(s => s > playbackSpeed) : SPEED_STEPS.findLastIndex(s => s < playbackSpeed);
  newIdx = Math.max(0, Math.min(SPEED_STEPS.length - 1, newIdx));
  playbackSpeed = SPEED_STEPS[newIdx];
  document.getElementById('tl-speed').textContent = playbackSpeed + '×';
  toast(`재생 속도: ${playbackSpeed}×`);
}

function previewStop() {
  isPlaying = false;
  if (playRAF) cancelAnimationFrame(playRAF);
  resetRouteProgress();
  if (isRecording) stopRecording();
}

function previewSeek(t) {
  playElapsed = t;
  playStartTime = performance.now() - t * 1000;
  const state = getStateAtTime(t);
  if (state) map.jumpTo({ center: [state.lng, state.lat], zoom: state.zoom, pitch: state.pitch, bearing: state.bearing });
  updateTimeDisplay(t);
}

function setRouteVisibility(show) {
  const vis = show ? 'visible' : 'none';
  ['routes-outline', 'routes-line', 'endpoints-circle'].forEach(id => {
    if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
  });
}

// 경로를 진행률에 따라 점진적으로 보여줌
let revealedRouteCount = -1; // -1 = 전부 표시 (비재생 상태)
function setRouteProgress(progress) {
  // progress: 0~1 (전체 타임라인 기준)
  const totalFeatures = routeGeoJSON.features.length;
  if (totalFeatures === 0) return;
  const target = Math.floor(progress * totalFeatures);
  if (target === revealedRouteCount) return;
  revealedRouteCount = target;

  // 필터: id < target인 feature만 표시
  const filter = ['<=', ['get', 'id'], target - 1];
  ['routes-outline', 'routes-line'].forEach(id => {
    if (map.getLayer(id)) map.setFilter(id, filter);
  });
  // endpoint는 route 2개씩 (shop, delivery)
  if (map.getLayer('endpoints-circle')) {
    map.setFilter('endpoints-circle', ['<=', ['get', 'routeId'], target - 1]);
  }
}

function resetRouteProgress() {
  revealedRouteCount = -1;
  ['routes-outline', 'routes-line', 'endpoints-circle'].forEach(id => {
    if (map.getLayer(id)) map.setFilter(id, null);
  });
}

// ===== 녹화 =====
function showExportModal() {
  if (scenes.length === 0) { toast('씬을 먼저 추가하세요'); return; }
  document.getElementById('export-modal').classList.add('show');
}
function hideExportModal() { document.getElementById('export-modal').classList.remove('show'); }

function startRender() {
  hideExportModal();
  const fps = +document.getElementById('ex-fps').value;
  const layer = document.getElementById('ex-layer').value;

  toast('렌더링 시작... 재생 완료 시 자동 저장');
  isRecording = true;
  document.getElementById('rec-indicator').style.display = 'block';
  recordedChunks = {};
  mediaRecorders = [];

  const mimeType = 'video/webm;codecs=vp9';
  const canvas = map.getCanvas();

  if (layer === 'composite' || layer === 'map' || layer === 'separate') {
    const stream = canvas.captureStream(fps);
    const rec = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12000000 });
    recordedChunks['map'] = [];
    rec.ondataavailable = e => { if (e.data.size > 0) recordedChunks['map'].push(e.data); };
    rec.onstop = () => saveRecording(layer === 'composite' ? 'composite' : 'map');
    mediaRecorders.push(rec);
    rec.start(100);
  }

  previewSeek(0);
  previewPlay();
}

function stopRecording() {
  isRecording = false;
  document.getElementById('rec-indicator').style.display = 'none';
  mediaRecorders.forEach(rec => { if (rec.state === 'recording') rec.stop(); });
  toast('렌더링 완료!');
}

function saveRecording(name) {
  const chunks = recordedChunks[name === 'composite' ? 'map' : name];
  if (!chunks || !chunks.length) return;
  const blob = new Blob(chunks, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `delivery_studio_${name}_${Date.now()}.webm`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${name} 영상 저장됨`);
}

// ===== 유틸 =====
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3000);
}

renderSceneList(); renderTimeline();

// ===== 비 효과 =====
let rainActive = false;
let rainRAF = null;
const rainCanvas = document.getElementById('rain-canvas');
const rainCtx = rainCanvas.getContext('2d');
let drops = [];

function initRainCanvas() {
  const rect = rainCanvas.parentElement.getBoundingClientRect();
  rainCanvas.width = rect.width * window.devicePixelRatio;
  rainCanvas.height = rect.height * window.devicePixelRatio;
  rainCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function createDrops() {
  const w = rainCanvas.width / window.devicePixelRatio;
  const h = rainCanvas.height / window.devicePixelRatio;
  drops = [];
  const count = Math.floor(w * h / 800);
  for (let i = 0; i < count; i++) {
    drops.push({
      x: Math.random() * w,
      y: Math.random() * h,
      len: 12 + Math.random() * 18,
      speed: 8 + Math.random() * 12,
      opacity: 0.15 + Math.random() * 0.3,
      width: 0.8 + Math.random() * 0.7
    });
  }
}

function drawRain() {
  if (!rainActive) return;
  const w = rainCanvas.width / window.devicePixelRatio;
  const h = rainCanvas.height / window.devicePixelRatio;
  rainCtx.clearRect(0, 0, w, h);

  const wind = Math.sin(Date.now() * 0.0003) * 2;

  for (const d of drops) {
    d.y += d.speed;
    d.x += wind * 0.5;
    if (d.y > h) { d.y = -d.len; d.x = Math.random() * w; }
    if (d.x > w) d.x = 0;
    if (d.x < 0) d.x = w;

    rainCtx.beginPath();
    rainCtx.moveTo(d.x, d.y);
    rainCtx.lineTo(d.x + wind * 0.3, d.y + d.len);
    rainCtx.strokeStyle = `rgba(180, 210, 240, ${d.opacity})`;
    rainCtx.lineWidth = d.width;
    rainCtx.lineCap = 'round';
    rainCtx.stroke();
  }

  // 바닥 splash (간단)
  for (let i = 0; i < 3; i++) {
    const sx = Math.random() * w;
    const sy = h - 2 - Math.random() * 6;
    rainCtx.beginPath();
    rainCtx.arc(sx, sy, 1 + Math.random() * 1.5, 0, Math.PI, true);
    rainCtx.strokeStyle = 'rgba(180, 210, 240, 0.2)';
    rainCtx.lineWidth = 0.5;
    rainCtx.stroke();
  }

  rainRAF = requestAnimationFrame(drawRain);
}

function toggleRain() {
  rainActive = !rainActive;
  const btn = document.getElementById('btn-rain');
  if (rainActive) {
    btn.classList.add('active');
    rainCanvas.classList.add('active');
    initRainCanvas();
    createDrops();
    drawRain();
  } else {
    btn.classList.remove('active');
    rainCanvas.classList.remove('active');
    if (rainRAF) cancelAnimationFrame(rainRAF);
    rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
  }
}

window.addEventListener('resize', () => { if (rainActive) { initRainCanvas(); createDrops(); } });
</script>
